<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopSmart | Profile</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Nunito:wght@700;800;900&family=Luckiest+Guy&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Styles -->
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="profile.css">
</head>
<body>
    <!-- Background Emoji Container -->
    <div id="emojiContainer" style="position: fixed; width: 100%; height: 100%; top: 0; left: 0; pointer-events: none; z-index: 0; overflow: hidden;"></div>

    <header class="navbar">
        <div class="logo-container">
            <a href="index.html"><img src="./Images/Logo_shopsmart.png" alt="ShopSmart Logo" class="logo"></a>
        </div>
        <nav class="nav-links">
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="help.html">Help</a>
            <a href="#">Contact Us</a>
        </nav>
        <div class="user-pill" onclick="logout()" style="cursor: pointer; background: #ff4d4d; border-color: #ff4d4d;">
            <i class="fa-solid fa-right-from-bracket"></i>
            <span>Log Out</span>
        </div>
    </header>

    <main class="profile-main-container">
        
        <!-- User Details Section -->
        <section class="profile-card">
            <div class="profile-header">
                <i class="fa-solid fa-user-shield massive-icon"></i>
                <h1 id="profUsername">Loading...</h1>
                <p id="profEmail">loading...</p>
            </div>
            
            <form class="profile-form" id="profileForm">
                <div class="form-row">
                    <div class="form-group">
                        <label>Age</label>
                        <input type="number" id="profAge" placeholder="e.g. 21">
                    </div>
                    <div class="form-group">
                        <label>Gender</label>
                        <select id="profGender">
                            <option value="">Select</option>
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Phone Number</label>
                        <input type="text" id="profPhone" placeholder="+91 99999 99999">
                    </div>
                </div>
                <!-- The audio requested a button to save these informations -->
                <button type="button" class="save-profile-btn" onclick="alert('Profile details saved (simulate in DB)!')">Save Details</button>
            </form>
        </section>

        <!-- Search History Section -->
        <section class="history-card">
            <h2><i class="fa-solid fa-clock-rotate-left"></i> Your Search History</h2>
            <div class="history-list" id="historyList">
                <p style="text-align: center; color: #444;">Fetching history...</p>
            </div>
        </section>

    </main>

    <footer>
        <p>© 2026 ShopSmart. All rights reserved. Designed by Sanil Mhatre.</p>
    </footer>

    <!-- Scripts -->
    <script src="script.js"></script>
    <script src="profile.js"></script>
</body>
</html>
